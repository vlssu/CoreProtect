name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v23.1-paper26)'
        required: true
        default: 'v23.1-paper26'
      release_name:
        description: 'Release name'
        required: true
        default: 'CoreProtect 23.1 (Paper 26.1 support)'
  push:
    branches:
      - 'copilot/merge-pull-879-and-upload-jar'

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build JAR
        run: mvn -B clean package -DskipTests

      - name: Find JAR
        id: find_jar
        run: |
          JAR=$(find target -name "CoreProtect-*.jar" ! -name "*original*" | head -1)
          echo "jar_path=$JAR" >> $GITHUB_OUTPUT
          echo "jar_name=$(basename $JAR)" >> $GITHUB_OUTPUT

      - name: Set release inputs
        id: release_inputs
        run: |
          echo "tag=${{ github.event.inputs.tag || 'v23.1-paper26' }}" >> $GITHUB_OUTPUT
          echo "release_name=${{ github.event.inputs.release_name || 'CoreProtect 23.1 (Paper 26.1 support)' }}" >> $GITHUB_OUTPUT

      - name: Create Release and Upload JAR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.release_inputs.outputs.tag }}" \
            "${{ steps.find_jar.outputs.jar_path }}" \
            --repo "${{ github.repository }}" \
            --title "${{ steps.release_inputs.outputs.release_name }}" \
            --notes "## CoreProtect with Paper 26.1 Support
