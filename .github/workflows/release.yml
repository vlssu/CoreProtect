name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v23.1-paper26)'
        required: true
        default: 'v23.1-paper26'
      release_name:
        description: 'Release name'
        required: true
        default: 'CoreProtect 23.1 (Paper 26.1 support)'

jobs:
  build:
    name: Build
    uses: ./.github/workflows/build.yml
    permissions:
      contents: read

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: CoreProtect-jar
          path: target/

      - name: Find JAR
        id: find_jar
        run: |
          JAR=$(find target -name "CoreProtect-*.jar" | head -1)
          echo "jar_path=$JAR" >> $GITHUB_OUTPUT
          echo "jar_name=$(basename $JAR)" >> $GITHUB_OUTPUT

      - name: Create Release and Upload JAR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.event.inputs.tag }}" \
            "${{ steps.find_jar.outputs.jar_path }}" \
            --repo "${{ github.repository }}" \
            --title "${{ github.event.inputs.release_name }}" \
            --notes "## CoreProtect with Paper 26.1 Support

Merged [PlayPro/CoreProtect#879](https://github.com/PlayPro/CoreProtect/pull/879) — adds support for Paper 26.1 (new year-based versioning format).

### Changes
- Added \`Bukkit_v26\` and \`Paper_v26\` adapters for the new Paper 26.x versioning
- Updated version detection to support both legacy \`1.x\` and new \`26.x\` format
- Improved \`VersionCheckService\` with regex-based version parsing"
